version: '3.8'  # 指定 Compose 文件格式版本

services:
  # 定义我们的服务名称，叫 "hero-analyzer"
  hero-analyzer:
    # 构建配置：告诉 Docker Compose 使用当前目录 (.) 的 Dockerfile 来构建镜像
    build: .
    
    # 镜像名称 (构建完成后生成的镜像名)
    image: hero-winrate-analyzer:latest
    
    # 容器名称 (方便识别)
    container_name: hero-winrate-container
    
    # 【核心】环境变量配置
    # env_file: 直接读取当前目录下的 .env 文件注入到容器内
    env_file:
      - .env
    
    # 【数据持久化】
    # 将容器内的 /app/logs (或者直接 /app) 挂载到宿主机
    # 这样即使容器删除了，生成的 Excel 和 Log 文件还在
    volumes:
      - ./output:/app  # 将宿主机当前目录下的 output 文件夹映射到容器的 /app
    
    # 重启策略：除非手动停止，否则总是重启 (包括服务器重启后)
    restart: unless-stopped
    
    # 网络模式 (可选)
    # 如果你的数据库在宿主机上 (比如你用的是 Mac/Windows 本地的 MySQL)，
    # 除了在 .env 里写 host.docker.internal，在 Linux 上可能需要 extra_hosts 或 network_mode: host
    # 这里是为了兼容 Mac/Windows 访问宿主机数据库的写法：
    extra_hosts:
      - "host.docker.internal:host-gateway"